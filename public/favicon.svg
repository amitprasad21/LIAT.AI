<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Luxury Golden Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8D5A3" />
      <stop offset="50%" stop-color="#C9A84C" />
      <stop offset="100%" stop-color="#A68232" />
    </linearGradient>
    <!-- Skeuomorphic Soft Shadow -->
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="5" stdDeviation="6" flood-color="#1A2D54" flood-opacity="0.15" />
    </filter>
  </defs>
  <!-- Background Glass Shield -->
  <circle cx="256" cy="256" r="230" fill="#E4EBF5" stroke="url(#goldGrad)" stroke-width="12" filter="url(#softShadow)" />
  <circle cx="256" cy="256" r="215" fill="#F1F6FA" opacity="0.9" />
  
  <!-- Interlocking Styled DM letters -->
  <g fill="url(#goldGrad)" style="font-family: 'Playfair Display', 'Cormorant Garamond', 'Georgia', serif; font-weight: 700;">
    <!-- D Letter -->
    <text x="120" y="320" font-size="200">D</text>
    <!-- M Letter -->
    <text x="240" y="320" font-size="200">M</text>
  </g>
</svg>
